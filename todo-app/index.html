<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <link rel="stylesheet" href="style.css">
<body>

    <div class="container">

        <h1>Todo App 🚀</h1>

        <div class="input-section">

            <input 
                type="text" 
                id="taskInput"
                placeholder="Enter your task..."
            >

            <button id="addbtn">
                Add
            </button>

        </div>

        <div class ="task-stats">

            <p id="totalTasks">
                Total Tasks : 0
            </p>

            <p id="completedTasks">
                Completed : 0
            </p>
        </div>

        <ul id="taskList"></ul>

        <p id="emptyMessage">
            No Tasks Yet!
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
